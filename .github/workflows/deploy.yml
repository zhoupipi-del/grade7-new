# GitHub Actions — 自动部署流水线（备用方案）
# 当 main 分支收到 push 时自动触发
# 通过 SSH 连接生产服务器执行 git pull + systemctl restart

name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:  # 支持手动触发

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e
            cd /opt/grade7-new
            echo "--- git pull ---"
            git pull origin main
            echo "--- restart service ---"
            systemctl restart grade7-new
            sleep 3
            echo "--- health check ---"
            STATUS=$(systemctl is-active grade7-new)
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:5001/health)
            echo "Service: $STATUS | Health: $HTTP_CODE"
            if [ "$STATUS" = "active" ] && [ "$HTTP_CODE" = "200" ]; then
              echo "=== DEPLOY SUCCESS ==="
              exit 0
            fi
            echo "=== DEPLOY FAILED === rolling back..."
            git checkout HEAD~1 -- .
            systemctl restart grade7-new
            exit 1

name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/grade7-new
            echo "--- git pull ---"
            git pull origin main
            echo "--- restart service ---"
            systemctl restart grade7-new
            sleep 3
            echo "--- health check ---"
            STATUS=$(systemctl is-active grade7-new)
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:5001/login || echo "000")
            echo "Service: $STATUS | Health: $HTTP_CODE"
            if [ "$STATUS" = "active" ] && [ "$HTTP_CODE" = "200" ]; then
              echo "=== DEPLOY SUCCESS ==="
              exit 0
            fi
            echo "=== DEPLOY FAILED === rolling back..."
            git checkout HEAD~1 -- .
            systemctl restart grade7-new
            exit 1

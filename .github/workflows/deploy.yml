name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 120s
          script: |
            set -e
            cd /opt/grade7-new
            echo "--- forcing sync with remote ---"
            git fetch origin main
            git reset --hard origin/main
            git clean -fd
            echo "--- synced to ---"
            git log --oneline -1
            echo "--- sync dependencies ---"
            /opt/grade7-new/venv/bin/python3 -m pip install --upgrade pip -q
            /opt/grade7-new/venv/bin/pip install -r requirements.txt
            echo "--- verify critical imports ---"
            /opt/grade7-new/venv/bin/python3 -c "import flask; import jwt; import sqlalchemy; import pymysql; print('All critical modules OK')" || { echo "=== CRITICAL IMPORT FAILED ==="; exit 1; }
            echo "--- restart service (stop + start for preload) ---"
            systemctl stop grade7-new
            sleep 2
            systemctl start grade7-new
            echo "--- waiting for boot (30+ blueprints + preload) ---"
            for i in $(seq 1 12); do
              sleep 5
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:5001/login 2>/dev/null || echo "000")
              echo "  attempt $i: HTTP $HTTP_CODE"
              if [ "$HTTP_CODE" = "200" ]; then
                echo "=== DEPLOY SUCCESS ==="
                exit 0
              fi
            done
            echo "=== DEPLOY FAILED === service did not respond in 60s"
            systemctl status grade7-new --no-pager -l | tail -20
            journalctl -u grade7-new --no-pager -n 20
            exit 1

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>相似学生推荐 - 梨江中学</title>
<script src="{{ url_for('static', filename='js/chart.umd.min.js') }}"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Microsoft YaHei', sans-serif; background:#f5f7fa; color:#333; padding:20px; }
.container { max-width:1200px; margin:0 auto; }
h1 { color:#2c3e50; margin-bottom:20px; }
.card { background:#fff; border-radius:12px; padding:24px; margin-bottom:20px; box-shadow:0 2px 12px rgba(0,0,0,0.08); }
.card-title { font-size:16px; font-weight:600; color:#2c3e50; margin-bottom:16px; }
.student-selector { display:flex; gap:12px; margin-bottom:20px; }
.student-selector select { flex:1; padding:10px; border:1px solid #ddd; border-radius:8px; font-size:14px; }
.btn { padding:10px 24px; border:none; border-radius:8px; cursor:pointer; font-size:14px; transition:all 0.3s; }
.btn-primary { background:linear-gradient(135deg, #667eea, #764ba2); color:#fff; }
.btn-primary:hover { transform:translateY(-2px); box-shadow:0 4px 12px rgba(102,126,234,0.4); }
.similar-list { display:grid; gap:12px; }
.similar-item { display:grid; grid-template-columns:80px 1fr auto; gap:16px; align-items:center; padding:16px; background:#f8f9fa; border-radius:8px; transition:all 0.3s; cursor:pointer; }
.similar-item:hover { background:#e9ecef; transform:translateX(4px); }
.similarity-score { text-align:center; }
.similarity-score .score { font-size:32px; font-weight:800; color:#667eea; }
.similarity-score .label { font-size:11px; color:#7f8c8d; }
.student-info h4 { margin:0 0 6px 0; color:#2c3e50; }
.student-info p { margin:0; font-size:13px; color:#7f8c8d; }
.student-actions { display:flex; gap:8px; }
.badge { display:inline-block; padding:3px 8px; border-radius:4px; font-size:11px; font-weight:600; }
.badge-success { background:#d4edda; color:#155724; }
.badge-warning { background:#fff3cd; color:#856404; }
.badge-danger { background:#f8d7da; color:#721c24; }
.feature-bars { margin-top:12px; }
.feature-bar { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.feature-bar .label { width:80px; font-size:12px; color:#7f8c8d; }
.feature-bar .bar { flex:1; height:6px; background:#ecf0f1; border-radius:3px; overflow:hidden; }
.feature-bar .bar-fill { height:100%; background:linear-gradient(90deg, #667eea, #764ba2); border-radius:3px; }
.loading { text-align:center; padding:40px; color:#7f8c8d; }
</style>
</head>
<body>

<div class="container">
  <h1>🔍 相似学生推荐</h1>
  
  <div class="card">
    <div class="card-title">选择学生</div>
    <div class="student-selector">
      <select id="class-select" onchange="loadStudents()">
        <option value="">-- 选择班级 --</option>
      </select>
      <select id="student-select" onchange="findSimilar()">
        <option value="">-- 选择学生 --</option>
      </select>
      <button class="btn btn-primary" onclick="findSimilar()">查找相似学生</button>
    </div>
  </div>

  <div id="result" class="loading">请选择学生查找相似学生...</div>
</div>

<script>
// 加载班级
fetch('/ml/api/classes')
  .then(r => r.json())
  .then(data => {
    const sel = document.getElementById('class-select');
    (data.classes || []).forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.id;
      opt.textContent = c.name;
      sel.appendChild(opt);
    });
  });

function loadStudents() {
  const classId = document.getElementById('class-select').value;
  if (!classId) return;
  fetch('/ml/api/students?class_id=' + classId)
    .then(r => r.json())
    .then(data => {
      const sel = document.getElementById('student-select');
      sel.innerHTML = '<option value="">-- 选择学生 --</option>';
      (data.students || []).forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.id;
        opt.textContent = s.name + ' (' + (s.student_no || s.id) + ')';
        sel.appendChild(opt);
      });
    });
}

function findSimilar() {
  const sid = document.getElementById('student-select').value;
  if (!sid) return;
  const resultDiv = document.getElementById('result');
  resultDiv.className = 'loading';
  resultDiv.innerHTML = '⏳ 正在分析学生特征，计算相似度...';
  
  fetch('/ml/api/similar-students/' + sid)
    .then(r => r.json())
    .then(data => {
      renderResult(data);
    })
    .catch(err => {
      resultDiv.innerHTML = '❌ 查找失败：' + err.message;
    });
}

function renderResult(data) {
  const resultDiv = document.getElementById('result');
  resultDiv.className = '';
  resultDiv.innerHTML = '';
  
  // 目标学生信息
  let html = '<div class="card">' +
    '<div class="card-title">目标学生：' + data.target_student.name + ' (' + data.target_student.class_name + ')</div>' +
    '<p style="color:#7f8c8d;">以下学生与 <strong>' + data.target_student.name + '</strong> 特征最相似：</p>' +
  '</div>';
  
  // 相似学生列表
  html += '<div class="card"><div class="card-title">相似学生列表（按相似度排序）</div>';
  html += '<div class="similar-list">';
  
  (data.similar_students || []).forEach((s, idx) => {
    const riskBadge = s.mental_risk === '高风险' ? 'badge-danger' : 
                     s.mental_risk === '中风险' ? 'badge-warning' : 'badge-success';
    
    html += '<div class="similar-item" onclick="viewStudent(' + s.student_id + ')">' +
      '<div class="similarity-score">' +
        '<div class="score">' + (s.similarity * 100).toFixed(1) + '%</div>' +
        '<div class="label">相似度</div>' +
      '</div>' +
      '<div class="student-info">' +
        '<h4>#' + (idx + 1) + ' ' + s.student_name + ' <span style="font-size:13px;color:#7f8c8d;">(' + s.class_name + ')</span></h4>' +
        '<p>成绩均分：' + s.avg_score + ' | 出勤率：' + s.attendance_rate + '% | 违纪：' + s.discipline_count + '次</p>' +
        '<div style="margin-top:6px;">' +
          '<span class="badge ' + riskBadge + '">' + s.mental_risk + '</span> ' +
          '<span class="badge badge-success">综合素质：' + s.quality_score + '</span>' +
        '</div>' +
      '</div>' +
      '<div class="student-actions">' +
        '<button class="btn btn-sm" style="background:#667eea;color:#fff;" onclick="event.stopPropagation();viewStudent(' + s.student_id + ')">查看详情</button>' +
      '</div>' +
    '</div>';
  });
  
  html += '</div></div>';
  resultDiv.innerHTML = html;
}

function viewStudent(sid) {
  alert('查看学生详情功能开发中...\n学生ID：' + sid);
}
</script>
</body>
</html>

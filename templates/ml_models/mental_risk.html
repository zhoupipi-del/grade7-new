{% extends "base.html" %}
{% block title %}心理风险模型{% endblock %}
{% block content %}
<div class="container-fluid mt-4">
    <h2><i class="bi bi-heart-pulse text-danger"></i> 心理健康风险模型（逻辑回归）</h2>
    <p class="text-muted">基于MSSMHS-55问卷数据，预测心理危机风险</p>
    <div class="row mt-4">
        <div class="col-md-4">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white"><h5 class="mb-0"><i class="bi bi-search"></i> 学生搜索</h5></div>
                <div class="card-body">
                    <input type="text" class="form-control mb-3" id="studentName" placeholder="输入学生姓名">
                    <button class="btn btn-danger w-100" onclick="predictMental()"><i class="bi bi-cpu"></i> 开始预测</button>
                </div>
            </div>
        </div>
        <div class="col-md-8">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white"><h5 class="mb-0"><i class="bi bi-clipboard2-pulse"></i> 预测结果</h5></div>
                <div class="card-body">
                    <div id="loadingArea" style="display:none;" class="text-center py-5">
                        <div class="spinner-border text-danger"></div>
                        <p class="mt-2">正在分析心理数据...</p>
                    </div>
                    <div id="resultArea" style="display:none;">
                        <p><strong>学生：</strong><span id="studentNameSpan"></span></p>
                        <p><strong>MSSMHS-55总分：</strong><span id="totalScore" class="fw-bold"></span></p>
                        <p><strong>风险概率：</strong><span id="riskProb" class="fw-bold"></span></p>
                        <p><strong>风险等级：</strong><span id="riskLevel"></span></p>
                        <div id="dimensionsArea" class="mt-3"></div>
                    </div>
                    <div id="noDataArea" style="display:none;" class="text-center py-5 text-muted">
                        <i class="bi bi-exclamation-circle" style="font-size: 3rem;"></i>
                        <p class="mt-2">该学生无心理问卷数据</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function predictMental() {
    const name = document.getElementById('studentName').value.trim();
    if (!name) { alert('请输入学生姓名'); return; }

    document.getElementById('loadingArea').style.display = 'block';
    document.getElementById('resultArea').style.display = 'none';
    document.getElementById('noDataArea').style.display = 'none';

    fetch(`/search/api?q=${encodeURIComponent(name)}&type=student`)
        .then(r => r.json())
        .then(data => {
            if (data.results && data.results.length > 0) {
                document.getElementById('studentNameSpan').textContent = data.results[0].name;
                return fetch(`/ai-analysis/api/predict/mental-health/${data.results[0].id}`);
            } else { throw new Error('未找到该学生'); }
        })
        .then(r => r.json())
        .then(data => {
            document.getElementById('loadingArea').style.display = 'none';
            if (data.code === 1) {
                document.getElementById('noDataArea').style.display = 'block';
                return;
            }
            document.getElementById('resultArea').style.display = 'block';
            document.getElementById('studentNameSpan').textContent = data.student_name;
            document.getElementById('totalScore').textContent = data.total_score;

            const prob = Math.round(data.risk_probability * 100);
            document.getElementById('riskProb').textContent = prob + '%';
            const badge = document.getElementById('riskLevel');
            if (data.risk_level === 'high') {
                badge.className = 'badge bg-danger fs-6';
                badge.textContent = '🔴 高风险';
            } else if (data.risk_level === 'medium') {
                badge.className = 'badge bg-warning fs-6';
                badge.textContent = '🟡 中风险';
            } else {
                badge.className = 'badge bg-success fs-6';
                badge.textContent = '🟢 低风险';
            }
        })
        .catch(err => {
            document.getElementById('loadingArea').style.display = 'none';
            alert('预测失败: ' + err.message);
        });
}
document.getElementById('studentName').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') predictMental();
});
</script>
{% endblock %}

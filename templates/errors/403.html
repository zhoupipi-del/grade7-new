<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 权限不足 - 梨江中学</title>
    <link href="{{ url_for('static', filename='css/bootstrap.min.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/app.css') }}" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card border-danger">
                    <div class="card-header bg-danger text-white">
                        <h5 class="mb-0"><i class="bi bi-shield-x"></i> 权限不足</h5>
                    </div>
                    <div class="card-body text-center py-5">
                        <div style="font-size:64px;color:#dc3545;margin-bottom:20px">403</div>
                        <h5>您没有权限访问此页面</h5>
                        <p class="text-muted mt-3">
                            当前角色：<strong>{{ user_role or '未知' }}</strong><br>
                            允许角色：<strong>{{ allowed_roles | join(', ') }}</strong>
                        </p>
                        <a href="{{ url_for('index') }}" class="btn btn-primary mt-3">
                            <i class="bi bi-house"></i> 返回首页
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

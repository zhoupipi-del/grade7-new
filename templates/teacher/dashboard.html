<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班主任工作台 - 梨江中学德育平台</title>
    <link href="{{ url_for('static', filename='bootstrap.min.css') }}" rel="stylesheet">
    <script src="{{ url_for('static', filename='js/echarts.min.js') }}"></script>
    <style>
        body { background: #f5f7fa; font-family: "Microsoft YaHei", sans-serif; }
        .header-bar { background: linear-gradient(135deg, #1a73e8, #0d47a1); color: white; padding: 18px 30px; }
        .header-bar h2 { margin: 0; font-size: 1.4rem; }
        .dimension-card { background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 20px; overflow: hidden; }
        .dimension-header { padding: 15px 20px; border-bottom: 1px solid #eee; font-weight: 600; font-size: 1.05rem; display: flex; align-items: center; gap: 8px; }
        .dimension-body { padding: 15px; height: 320px; }
        .alert-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.78rem; font-weight: 600; }
        .badge-high { background: #ffebee; color: #c62828; }
        .badge-medium { background: #fff3e0; color: #e65100; }
        .badge-low { background: #e8f5e9; color: #2e7d32; }
        .student-list { max-height: 280px; overflow-y: auto; }
        .student-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; border-bottom: 1px solid #f5f5f5; }
        .student-item:last-child { border-bottom: none; }
        . refreshing-indicator { font-size: 0.8rem; color: #888; }
    </style>
</head>
<body>

<!-- ── 顶部导航 ── -->
<div class="header-bar d-flex justify-content-between align-items-center">
    <h2>📊 班主任四维工作台</h2>
    <div>
        <span class="refreshing-indicator">最后更新：<span id="update-time">--</span></span>
        <a href="/class/" class="btn btn-sm btn-outline-light ms-2">返回班级管理</a>
    </div>
</div>

<!-- ── 班级选择器（年级组长/德育处） ── -->
{% if role in ("grade_leader", "ms_admin") %}
<div class="container-fluid mt-3">
    <div class="row">
        <div class="col-12">
            <div class="dimension-card">
                <div class="dimension-header">🏫 选择班级</div>
                <div class="dimension-body" style="height: auto; padding: 15px;">
                    <div class="d-flex flex-wrap gap-2">
                        {% for c in classes %}
                        <a href="/teacher/dashboard/{{ c.id }}" class="btn btn-sm {% if current_class and current_class.id == c.id %}btn-primary{% else %}btn-outline-primary{% endif %}">
                            {{ c.name }}
                        </a>
                        {% endfor %}
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endif %}

<!-- ── 四维面板 ── -->
{% if current_class %}
<div class="container-fluid mt-3">
    <div class="row">
        <!-- 第一行：学业趋势 + 纪律红黄牌 -->
        <div class="col-md-6">
            <div class="dimension-card">
                <div class="dimension-header">📈 学业趋势（最近3次考试）</div>
                <div class="dimension-body" id="academic-chart"></div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="dimension-card">
                <div class="dimension-header">🚩 纪律红黄牌（本周）</div>
                <div class="dimension-body" id="discipline-chart"></div>
            </div>
        </div>

        <!-- 第二行：考勤预警 + 心理风险雷达 -->
        <div class="col-md-6">
            <div class="dimension-card">
                <div class="dimension-header">📅 考勤预警（本月）</div>
                <div class="dimension-body" id="attendance-panel">
                    <div id="attendance-chart" style="height: 250px;"></div>
                    <div class="student-list mt-2" id="attendance-warnings"></div>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="dimension-card">
                <div class="dimension-header">🧠 心理风险雷达</div>
                <div class="dimension-body" id="mental-chart"></div>
            </div>
        </div>

        <!-- 第三行：风险学生名单 -->
        <div class="col-12">
            <div class="dimension-card">
                <div class="dimension-header">⚠️ 需关注学生名单</div>
                <div class="dimension-body" style="height: auto; max-height: 400px; overflow-y: auto;">
                    <div class="row">
                        <div class="col-md-4">
                            <h6 class="text-danger">🔴 心理高风险</h6>
                            <div class="student-list" id="mental-high-risk"></div>
                        </div>
                        <div class="col-md-4">
                            <h6 class="text-warning">🟡 出勤率过低（<80%）</h6>
                            <div class="student-list" id="attendance-low"></div>
                        </div>
                        <div class="col-md-4">
                            <h6 class="text-info">🟢 本周违纪 TOP 5</h6>
                            <div class="student-list" id="discipline-top"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% else %}
<div class="container-fluid mt-5">
    <div class="alert alert-info">请选择班级查看四维工作台</div>
</div>
{% endif %}

<!-- ── JS：ECharts 渲染 ── -->
<script>
const DATA = {{ dimension_data | tojson }};

// 更新时间戳
document.getElementById('update-time').textContent = DATA.updated_at || '--';

// ══════════════════════════════════════
//  维度 1：学业趋势折线图
// ══════════════════════════════════════
if (DATA.academic && DATA.academic.exams && DATA.academic.exams.length > 0) {
    const academicChart = echarts.init(document.getElementById('academic-chart'));
    const subjects = Object.keys(DATA.academic.class_avg[DATA.academic.exams[0]] || {});
    const series = subjects.map(subj => ({
        name: subj,
        type: 'line',
        smooth: true,
        data: DATA.academic.exams.map(examName => {
            const avg = DATA.academic.class_avg[examName];
            return avg ? avg[subj] : null;
        })
    }));

    academicChart.setOption({
        tooltip: { trigger: 'axis' },
        legend: { bottom: 0, textStyle: { fontSize: 11 } },
        grid: { top: 30, bottom: 50, left: 50, right: 20 },
        xAxis: { type: 'category', data: DATA.academic.exams },
        yAxis: { type: 'value', name: '平均分', min: 0, max: 120 },
        series: series
    });
}

// ══════════════════════════════════════
//  维度 2：纪律红黄牌柱状图
// ══════════════════════════════════════
if (DATA.discipline) {
    const disciplineChart = echarts.init(document.getElementById('discipline-chart'));
    const typeDist = DATA.discipline.type_dist || {};
    const types = Object.keys(typeDist);
    const counts = Object.values(typeDist);

    disciplineChart.setOption({
        tooltip: { trigger: 'item' },
        color: ['#ef5350', '#ff9800', '#ffca28', '#66bb6a'],
        series: [{
            type: 'pie',
            radius: ['40%', '70%'],
            label: { formatter: '{b}: {c}次 ({d}%)', fontSize: 12 },
            data: types.map((t, i) => ({ name: t, value: counts[i] }))
        }]
    });

    // 渲染违纪列表
    const disciplineList = document.getElementById('discipline-top');
    if (disciplineList && DATA.discipline.top_students) {
        disciplineList.innerHTML = DATA.discipline.top_students.map(s =>
            `<div class="student-item">
                <span>${s.name}</span>
                <span class="alert-badge badge-high">${s.count}次</span>
            </div>`
        ).join('') || '<div class="text-muted p-2">本周无违纪记录</div>';
    }
}

// ══════════════════════════════════════
//  维度 3：考勤预警
// ══════════════════════════════════════
if (DATA.attendance) {
    const attendanceChart = echarts.init(document.getElementById('attendance-chart'));
    const warnings = DATA.attendance.warning_students || [];

    if (warnings.length > 0) {
        attendanceChart.setOption({
            tooltip: { trigger: 'axis' },
            xAxis: { type: 'category', data: warnings.map(w => w.name), axisLabel: { rotate: 30 } },
            yAxis: { type: 'value', name: '出勤率(%)', min: 0, max: 100 },
            series: [{
                type: 'bar',
                data: warnings.map(w => w.rate),
                itemStyle: { color: '#ef5350' },
                label: { show: true, position: 'top', formatter: '{c}%' }
            }]
        });
    } else {
        document.getElementById('attendance-chart').innerHTML = '<div class="text-success p-3">✅ 本月无考勤预警学生</div>';
    }

    // 渲染预警名单
    const attWarn = document.getElementById('attendance-warnings');
    if (attWarn) {
        attWarn.innerHTML = warnings.length > 0
            ? warnings.map(s => `
                <div class="student-item">
                    <span>${s.name}</span>
                    <span>
                        <span class="alert-badge badge-high">${s.rate}%</span>
                        ${s.连续_absent >= 2 ? '<span class="alert-badge badge-medium">连续缺勤' + s.连续_absent + '天</span>' : ''}
                    </span>
                </div>`).join('')
            : '<div class="text-muted p-2">无预警</div>';
    }
}

// ══════════════════════════════════════
//  维度 4：心理风险雷达图
// ══════════════════════════════════════
if (DATA.mental && DATA.mental.radar_dimensions && DATA.mental.radar_dimensions.length > 0) {
    const mentalChart = echarts.init(document.getElementById('mental-chart'));
    mentalChart.setOption({
        tooltip: {},
        color: ['#42a5f5', '#ef5350'],
        radar: {
            indicator: DATA.mental.radar_dimensions.map(d => ({ name: d, max: 10 })),
            shape: 'polygon'
        },
        series: [{
            type: 'radar',
            data: [
                {
                    value: DATA.mental.class_avg_scores,
                    name: '全班平均',
                    areaStyle: { opacity: 0.3 }
                }
            ]
        }]
    });
} else if (DATA.mental && DATA.mental.total == 0) {
    document.getElementById('mental-chart').innerHTML = '<div class="text-muted p-3">暂无心理健康评估数据</div>';
}

// ══════════════════════════════════════
//  风险学生名单渲染
// ══════════════════════════════════════
// 心理高风险
const mentalHigh = document.getElementById('mental-high-risk');
if (mentalHigh && DATA.mental) {
    mentalHigh.innerHTML = DATA.mental.high_risk_students && DATA.mental.high_risk_students.length > 0
        ? DATA.mental.high_risk_students.map(s => `
            <div class="student-item">
                <span>${s.name}</span>
                <span class="alert-badge badge-high">${s.risk_level}</span>
            </div>`).join('')
        : '<div class="text-muted p-2">无高风险学生</div>';
}

// 出勤率过低
const attLow = document.getElementById('attendance-low');
if (attLow && DATA.attendance) {
    const lowRate = (DATA.attendance.warning_students || []).filter(w => w.rate < 80);
    attLow.innerHTML = lowRate.length > 0
        ? lowRate.map(s => `
            <div class="student-item">
                <span>${s.name}</span>
                <span class="alert-badge badge-high">${s.rate}%</span>
            </div>`).join('')
        : '<div class="text-muted p-2">无</div>';
}

// 违纪 TOP
const discTop = document.getElementById('discipline-top');
if (discTop && DATA.discipline) {
    discTop.innerHTML = DATA.discipline.top_students && DATA.discipline.top_students.length > 0
        ? DATA.discipline.top_students.map(s => `
            <div class="student-item">
                <span>${s.name}</span>
                <span class="alert-badge badge-medium">${s.count}次</span>
            </div>`).join('')
        : '<div class="text-muted p-2">无</div>';
}

// 响应式 resize
window.addEventListener('resize', () => {
    echarts.getInstanceByDom(document.getElementById('academic-chart'))?.resize();
    echarts.getInstanceByDom(document.getElementById('discipline-chart'))?.resize();
    echarts.getInstanceByDom(document.getElementById('attendance-chart'))?.resize();
    echarts.getInstanceByDom(document.getElementById('mental-chart'))?.resize();
});
</script>

</body>
</html>

<div class="d-flex align-items-center mb-3">
  <a href="{{ url_for('class.dashboard') }}" class="btn btn-outline-secondary btn-sm me-3">
    <i class="bi bi-arrow-left me-1"></i> 返回
  </a>
  <h4 class="mb-0"><i class="bi bi-megaphone me-2"></i>通知家长</h4>
</div>

<div class="card">
  <div class="card-body">
    <form method="POST">
      <div class="mb-3">
        <label class="form-label">通知标题</label>
        <input type="text" name="title" class="form-control" required placeholder="例如：关于期末家长会的通知">
      </div>
      <div class="mb-3">
        <label class="form-label">通知内容</label>
        <textarea name="content" class="form-control" rows="5" required placeholder="请输入通知内容..."></textarea>
      </div>
      <div class="mb-3">
        <label class="form-label">发送给</label>
        <div class="d-flex gap-2 mb-2">
          <button type="button" class="btn btn-outline-primary btn-sm" onclick="selectAll()">全选</button>
          <button type="button" class="btn btn-outline-secondary btn-sm" onclick="deselectAll()">取消全选</button>
        </div>
        <div class="row g-2">
          {% for s in students %}
          <div class="col-md-3">
            <label class="form-check" style="cursor:pointer;">
              <input class="form-check-input" type="checkbox" name="student_ids" value="{{ s.id }}">
              {{ s.name }}
            </label>
          </div>
          {% endfor %}
        </div>
      </div>
      <div class="text-muted small mb-3">
        <i class="bi bi-info-circle me-1"></i> 通知将发送给所选学生绑定的家长账号
      </div>
      <button type="submit" class="btn btn-primary">
        <i class="bi bi-send me-1"></i> 发送通知
      </button>
    </form>
  </div>
</div>

<script>
function selectAll() { document.querySelectorAll('input[name="student_ids"]').forEach(function(cb) { cb.checked = true; }); }
function deselectAll() { document.querySelectorAll('input[name="student_ids"]').forEach(function(cb) { cb.checked = false; }); }
</script>

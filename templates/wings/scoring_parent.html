<div class="d-flex align-items-center mb-3">
  <a href="{{ url_for('wings.score_page') }}" class="btn btn-outline-secondary btn-sm me-3">
    <i class="bi bi-arrow-left me-1"></i> 返回
  </a>
  <h4 class="mb-0"><i class="bi bi-house-heart me-2"></i>家长评分</h4>
</div>

{% if student %}
<div class="row g-3">
  <div class="col-md-4">
    <div class="card">
      <div class="card-header"><strong>孩子信息</strong></div>
      <div class="card-body">
        <h5>{{ student.name }}</h5>
        <p class="text-muted mb-0">
          {{ student.class_.name if student.class_ else '?' }}
          {% if student.student_no %} | {{ student.student_no }}{% endif %}
        </p>
      </div>
    </div>
  </div>
  <div class="col-md-8">
    <div class="card">
      <div class="card-header"><strong>给孩子的五翼评分</strong></div>
      <div class="card-body">
        <div class="row g-3">
          {% for d in dimensions %}
          <div class="col">
            <div class="text-center">
              <label class="form-label fw-bold fs-5">{{ d }}</label>
              <div class="d-flex align-items-center gap-2 justify-content-center">
                <input type="range" class="form-range" id="dim-{{ d }}" min="0" max="10" step="0.5" value="5" style="width:100px;"
                       oninput="document.getElementById('val-{{ d }}').textContent = this.value">
                <span class="badge bg-primary" id="val-{{ d }}">5</span>
              </div>
            </div>
          </div>
          {% endfor %}
        </div>
        <div class="text-center mt-3">
          <button class="btn btn-primary btn-lg" onclick="saveParentScore()">
            <i class="bi bi-send me-1"></i> 提交评分
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
{% else %}
<div class="text-center py-5">
  <i class="bi bi-person-x display-1 text-muted"></i>
  <p class="text-muted mt-3">未绑定学生</p>
  <p class="small text-muted">请联系班主任绑定您的孩子</p>
</div>
{% endif %}

{% if student %}
<script>
function saveParentScore() {
  var promises = [];
  {% for d in dimensions %}
  promises.push(fetch('/wings/api/score/save', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      student_id: {{ student.id }},
      dimension: '{{ d }}',
      score: parseFloat(document.getElementById('dim-{{ d }}').value),
      scorer_type: 'parent',
      class_id: {{ student.class_id or 0 }},
      grade_id: {{ student.grade_id or 0 }}
    })
  }).then(function(r) { return r.json(); }));
  {% endfor %}
  Promise.all(promises).then(function() {
    alert('评分已提交！');
    location.reload();
  });
}
</script>
{% endif %}
